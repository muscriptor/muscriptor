name: Deploy demo

on:
  workflow_dispatch:

concurrency:
  group: deploy-demo
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up SSH access to the deployment host
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        # docker -H ssh://... uses the system ssh client, which picks up this default key.
        echo "${{ secrets.DEPLOYMENT_SSH_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        # Trust the host key so the ssh connection isn't blocked by the prompt.
        ssh-keyscan muscriptor.kyutai.org >> ~/.ssh/known_hosts
    - name: Deploy
      env:
        HF_TOKEN: ${{ secrets.DEPLOYMENT_HF_TOKEN }}
      run: ./deploy.sh
